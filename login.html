<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Login | SchoolKite</title>
    <script src="tailwind.js"></script>
    <link rel="icon" type="image/jpeg" href="images\images (2).webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           CORE STYLES & VARIABLES (NEW SOLID DESIGN)
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* STRICT NO SCROLL LOCK */
        html, body { 
            height: 100vh !important; 
            width: 100vw !important;
            overflow: hidden !important; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
        }

        /* === SchoolKite THEME VARIABLES (CRISP & TECHNICAL) === */
        :root {
            /* Backgrounds */
            --bg-color: #F8FAFC; 
            --grid-color: rgba(14, 165, 233, 0.15);
            
            /* Card & Text */
            --bg-card: #FFFFFF; 
            --card-border: #E2E8F0;
            --text-main: #0F172A;
            --text-muted: #64748B;
            
            /* Inputs */
            --input-bg: #F1F5F9;
            --input-border: #CBD5E1;
            --input-focus-bg: #FFFFFF;
            --input-text: #0F172A;
            --input-icon: #94A3B8;
            
            /* Top Controls */
            --page-text: #334155; 
            --toggle-bg: #E2E8F0; 
            
            /* Accents & Buttons (Solid Ocean Blue) */
            --accent-color: #0EA5E9; 
            --accent-hover: #0284C7; 
            --btn-text: #FFFFFF;
            
            --radius: 12px; /* Sharper corners */
            --shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15); /* Clean, deep shadow */
        }

        /* DARK MODE */
        body.dark-mode {
            --bg-color: #0B1120; 
            --grid-color: rgba(56, 189, 248, 0.1);
            
            --bg-card: #1E293B; 
            --card-border: #334155;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            
            --input-bg: #0F172A;
            --input-border: #334155;
            --input-focus-bg: #1E293B;
            --input-text: #F8FAFC;
            --input-icon: #64748B;
            
            --page-text: #E2E8F0; 
            --toggle-bg: #334155; 
            
            --accent-color: #38BDF8; 
            --accent-hover: #7DD3FC;
            --btn-text: #0F172A;

            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        /* NEW BACKGROUND: TECHNICAL GRID INSTEAD OF BLURRY GRADIENTS */
        body { 
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: center center;
            transition: background-color 0.5s ease;
            display: flex;
            flex-direction: column; 
            position: relative;
        }

        /* RTL SUPPORT (Kept exactly identical for placement) */
        [dir="rtl"] { text-align: right; }
        [dir="rtl"] .ml-2 { margin-left: 0; margin-right: 0.5rem; }
        [dir="rtl"] .mr-3 { margin-left: 0.75rem; margin-right: 0; }
        [dir="rtl"] .input-icon { left: auto; right: 16px; }
        [dir="rtl"] .input-field { padding: clamp(10px, 2vh, 14px) 44px clamp(10px, 2vh, 14px) 16px !important; }
        [dir="rtl"] .btn-icon { margin-left: 0; margin-right: 8px; transform: rotate(180deg); }

        /* =========================================
           TOP CONTROLS BAR
           ========================================= */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            padding: 1rem 1.5rem;
            gap: 1.5rem;
            z-index: 50;
            flex-shrink: 0;
        }

        .toggle { 
            width: 44px; height: 26px; 
            background: var(--toggle-bg); 
            border: 1px solid var(--card-border);
            border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; 
            flex-shrink: 0;
        }
        .toggle::before { 
            content: ''; position: absolute; width: 20px; height: 20px; 
            background: white; border-radius: 50%; top: 2px; left: 3px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }
        body.dark-mode .toggle::before { left: 19px; background: var(--accent-color); box-shadow: none; }
        
        .top-btn-text { 
            font-size: 0.7rem; font-weight: 800; color: var(--page-text); 
            background: var(--bg-card); border: 2px solid var(--card-border); 
            padding: 8px 14px; border-radius: 8px; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; letter-spacing: 1px; 
        }
        .top-btn-text:hover { 
            border-color: var(--accent-color); color: var(--accent-color);
        }

        /* MAIN WRAPPER */
        .main-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
            z-index: 10;
        }

        /* LOGIN CARD (SOLID, SHARP, TECHNICAL) */
        .login-card {
            background-color: var(--bg-card);
            border: 1px solid var(--card-border);
            border-top: 5px solid var(--accent-color); /* Bold accent top line */
            border-radius: var(--radius);
            padding: clamp(1.5rem, 4vh, 2.5rem) 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: clamp(14px, 2.5vh, 24px); 
            position: relative;
            overflow: hidden !important; 
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* HEADERS */
        .auth-logo { display: flex; justify-content: center; margin-bottom: 2px; }
        .auth-header { text-align: center; }
        .auth-header h2 { font-size: clamp(1.25rem, 3vh, 1.5rem); font-weight: 800; color: var(--text-main); margin-bottom: 4px; letter-spacing: -0.5px; }
        .auth-header p { font-size: clamp(0.8rem, 1.8vh, 0.85rem); color: var(--text-muted); margin: 0; font-weight: 500; }

        /* FORM */
        form {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vh, 16px); 
            margin: 0;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label { font-size: 0.75rem; font-weight: 700; color: var(--text-main); margin: 0; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--input-icon); font-size: 1rem; transition: color 0.3s; pointer-events: none; }
        
        /* NEW INPUT STYLE: Solid, 2px borders, flat background */
        .input-field {
            width: 100%;
            padding: clamp(10px, 2vh, 12px) 16px clamp(10px, 2vh, 12px) 44px;
            border: 2px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--input-text);
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
            margin: 0;
        }
        .input-field::placeholder { color: var(--input-icon); opacity: 0.8; font-weight: 500; }
        .input-field:focus { 
            outline: none; 
            border-color: var(--accent-color); 
            background-color: var(--input-focus-bg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .input-field:focus + .input-icon, 
        .input-field:focus ~ .input-icon { 
            color: var(--accent-color); 
        }

        /* Password Field Specifics */
        .password-field { padding-right: 44px !important; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            color: var(--input-icon); background: none; border: none; cursor: pointer;
            padding: 4px 8px; transition: color 0.3s; font-size: 1rem; z-index: 5;
        }
        .password-toggle:hover, .password-toggle:focus { color: var(--accent-color); outline: none; }
        [dir="rtl"] .password-field { padding-right: 44px !important; padding-left: 44px !important; }
        [dir="rtl"] .password-toggle { right: auto; left: 12px; }

        .utility-row {
            display: flex; justify-content: space-between; align-items: center;
            margin: 0; padding: 2px 0;
        }

        input[type="checkbox"] {
            width: 16px; height: 16px; border-radius: 4px; cursor: pointer;
            accent-color: var(--accent-color);
        }

        /* NEW BUTTON STYLE: Flat, highly contrasting, slightly rounded */
        .auth-btn {
            width: 100%; 
            padding: clamp(12px, 2.5vh, 14px);
            background-color: var(--accent-color);
            color: var(--btn-text); 
            border: 2px solid transparent; 
            border-radius: 8px;
            font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s ease;
            margin-top: 8px; 
            display: flex; align-items: center; justify-content: center;
        }
        .auth-btn:hover { 
            background-color: var(--accent-hover);
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.25); 
        }
        body.dark-mode .auth-btn:hover { box-shadow: 0 10px 15px -3px rgba(56, 189, 248, 0.25); }

        /* DIVIDER */
        .divider { text-align: center; position: relative; margin: 4px 0; }
        .divider::before { content: ''; position: absolute; left: 0; top: 50%; width: 100%; height: 2px; background: var(--card-border); }
        .divider span { position: relative; background: var(--bg-card); padding: 0 16px; color: var(--text-muted); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* SOCIALS */
        .social-login { display: flex; justify-content: center; gap: 12px; }
        .social-btn {
            flex: 1; height: 46px;
            border: 2px solid var(--input-border); border-radius: 8px; 
            background-color: transparent;
            font-size: 1.2rem; color: var(--text-main);
            cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .social-btn:hover { 
            background-color: var(--input-bg);
            border-color: var(--accent-color);
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        /* FOOTER LINKS */
        .login-link { text-align: center; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; margin-top: 4px; }
        .login-link a { color: var(--accent-color); font-weight: 800; text-decoration: none; transition: all 0.2s; }
        .login-link a:hover { color: var(--accent-hover); text-decoration: underline; }

        /* =========================================
           ULTRA-COMPACT MOBILE OPTIMIZATIONS 
           ========================================= */
        @media (max-width: 400px), (max-height: 750px) {
            .top-bar { padding: 0.8rem 1rem; gap: 1rem; }
            .login-card { padding: 1.5rem !important; gap: 16px !important; width: 95%; border-radius: 12px; }
            .auth-logo { margin-bottom: 0 !important; }
            .auth-header h2 { font-size: 1.2rem !important; margin-bottom: 2px !important; }
            .auth-header p { font-size: 0.75rem !important; } 
            
            form { gap: 12px !important; }
            .form-group { gap: 6px !important; }
            .input-field { padding: 10px 14px 10px 40px !important; font-size: 0.85rem !important; height: 42px !important; border-radius: 8px; }
            .input-icon { font-size: 0.9rem !important; left: 14px !important; }
            
            .password-field { padding-right: 40px !important; }
            .password-toggle { right: 8px !important; font-size: 0.9rem !important; }

            [dir="rtl"] .input-field { padding: 10px 40px 10px 14px !important; }
            [dir="rtl"] .input-icon { right: 14px !important; left: auto !important; }
            [dir="rtl"] .password-field { padding-left: 40px !important; padding-right: 14px !important; }
            [dir="rtl"] .password-toggle { left: 8px !important; right: auto !important; }
            
            .utility-row span { font-size: 0.7rem !important; }
            .utility-row a { font-size: 0.7rem !important; }
            
            .auth-btn { height: 42px !important; padding: 0 !important; font-size: 0.8rem !important; margin-top: 4px !important; border-radius: 8px;}
            .social-btn { height: 40px !important; font-size: 1rem !important; border-radius: 8px;}
            .login-link { font-size: 0.75rem !important; }
        }

        @media (max-height: 600px) {
            .top-bar { padding: 0.5rem 1rem; }
            .login-card { gap: 10px !important; padding: 1.2rem !important; border-radius: 12px; }
            form { gap: 10px !important; }
            .auth-header p { display: none !important; }
            .input-field { padding: 8px 12px 8px 36px !important; font-size: 0.8rem !important; height: 36px !important; border-radius: 6px;}
            .input-icon { left: 12px !important; font-size: 0.8rem !important; }
            
            .password-field { padding-right: 36px !important; }
            .password-toggle { right: 6px !important; font-size: 0.8rem !important; padding: 2px 6px !important; }

            [dir="rtl"] .input-field { padding: 8px 36px 8px 12px !important; }
            [dir="rtl"] .input-icon { right: 12px !important; left: auto !important; }
            [dir="rtl"] .password-field { padding-left: 36px !important; padding-right: 12px !important; }
            [dir="rtl"] .password-toggle { left: 6px !important; right: auto !important; }

            .auth-btn { height: 36px !important; font-size: 0.75rem !important; border-radius: 6px;}
            .social-btn { height: 34px !important; font-size: 0.85rem !important; border-radius: 6px;}
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="flex items-center gap-2" style="cursor: pointer;" onclick="document.getElementById('theme-toggle').click()">
            <i class="fas fa-sun text-xs" style="color: var(--page-text); transition: color 0.3s;"></i>
            <div class="toggle" id="theme-toggle"></div>
            <i class="fas fa-moon text-xs" style="color: var(--page-text); transition: color 0.3s;"></i>
        </div>
        <button id="rtl-toggle" class="top-btn-text">RTL Mode</button>
    </div>

    <div class="main-wrapper">
        <div class="login-card">

            <div class="auth-logo">
                <a href="index.html" class="flex items-center text-xl lg:text-2xl font-black tracking-tighter" style="color: var(--text-main); text-decoration: none;">
                    SchoolKite
                </a>
            </div>

            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to book sessions and track your progress.</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="input-field" placeholder="name@example.com" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="input-field password-field" placeholder="••••••••" required>
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" id="toggle-password" tabindex="-1" aria-label="Toggle password visibility">
                            <i class="fas fa-eye" id="toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="utility-row flex-wrap sm:flex-nowrap gap-2">
                    <label class="flex items-center cursor-pointer truncate">
                        <input type="checkbox" class="flex-shrink-0 cursor-pointer">
                        <span class="ml-2 text-xs font-semibold truncate" style="color: var(--text-muted);">Remember me</span>
                    </label>
                    <a href="#" class="text-xs font-bold transition whitespace-nowrap hover:opacity-80" style="color: var(--text-main);">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-btn">Sign In <i class="fas fa-arrow-right ml-2 btn-icon"></i></button>
            </form>

            <div class="divider"><span>Or authenticate with</span></div>

            <div class="social-login">
                <button class="social-btn" type="button" title="Sign in with Microsoft"><i class="fab fa-microsoft"></i></button>
                <button class="social-btn" type="button" title="Sign in with Google"><i class="fab fa-google"></i></button>
                <button class="social-btn" type="button" title="Sign in with Apple"><i class="fab fa-apple"></i></button>
            </div>

            <div class="login-link">
                Need an account? <a href="register.html">Register Now</a>
            </div>

        </div>
    </div>

    <script>
        // --- THEME LOGIC ---
        const themeToggle = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.classList.add('active');
        }

        themeToggle.onclick = (e) => {
            e.stopPropagation(); 
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggle.classList.toggle('active', isDark);
        };

        // --- RTL LOGIC ---
        const rtlToggle = document.getElementById('rtl-toggle');
        const savedDir = localStorage.getItem('dir') || 'ltr';
        
        if (savedDir === 'rtl') {
            document.documentElement.dir = 'rtl';
            rtlToggle.innerText = "LTR MODE";
        }

        rtlToggle.onclick = () => {
            const isRTL = document.documentElement.dir === 'rtl';
            document.documentElement.dir = isRTL ? 'ltr' : 'rtl';
            localStorage.setItem('dir', isRTL ? 'ltr' : 'rtl');
            rtlToggle.innerText = isRTL ? 'RTL MODE' : 'LTR MODE';
        };

        // --- PASSWORD TOGGLE LOGIC ---
        const togglePasswordBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggle-icon');

        togglePasswordBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleIcon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        });

        // --- FORM SUBMISSION ---
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Redirecting to the user dashboard
            window.location.href = 'user.html'; 
        });

        // Social Buttons Alert
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                alert('SSO integration required for enterprise accounts.');
            });
        });
    </script>
</body>
</html>
